events {}

http {
    upstream identity {
        server identity-svc:80;
    }

    upstream posts {
        server posts-svc:80;
    }

    upstream chats {
        server chats-svc:80;
    }

    upstream follows {
        server follows-svc:80;
    }

    server {
        listen 80;

        location /identity/ {
            proxy_pass http://identity/api/v1/identity/;
        }

        location /posts/ {
            proxy_pass http://posts/api/v1/posts/;
        }

        location /chats/ {
            proxy_pass http://chats/api/v1/chats/;
        }

        location /follows/ {
            proxy_pass http://follows/api/v1/follows/;
        }
    }
}