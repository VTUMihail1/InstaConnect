networks:
  instaconnect:

services:
  otel-lgtm:
    image: grafana/otel-lgtm
    container_name: otel-lgtm
    hostname: otel-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./.containers/grafana:/data
    networks:
      - instaconnect

  mongo-primary:
    image: docker.io/bitnami/mongodb:latest
    container_name: mongo-primary
    hostname: mongo-primary
    restart: unless-stopped
    volumes:
      - ./.containers/mongo/primary:/bitnami/mongodb
      - ./mongo/scripts:/docker-entrypoint-initdb.d:ro
    environment:
      MONGODB_ADVERTISED_HOSTNAME: mongo-primary
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_REPLICA_SET_KEY: rs0key
      MONGODB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGODB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGODB_USERNAME: ${MONGO_USERNAME}
      MONGODB_PASSWORD: ${MONGO_PASSWORD}
      MONGODB_DATABASE: admin
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USERNAME}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - instaconnect

  mongo-secondary:
    image: docker.io/bitnami/mongodb:latest
    container_name: mongo-secondary
    hostname: mongo-secondary
    restart: unless-stopped
    depends_on:
      mongo-primary:
        condition: service_healthy
    environment:
      MONGODB_ADVERTISED_HOSTNAME: mongo-secondary
      MONGODB_REPLICA_SET_MODE: secondary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_REPLICA_SET_KEY: rs0key
      MONGODB_INITIAL_PRIMARY_HOST: mongo-primary
      MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
      MONGODB_INITIAL_PRIMARY_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./.containers/mongo/secondary:/bitnami/mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USERNAME}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - instaconnect

  mongodb-arbiter:
    image: docker.io/bitnami/mongodb:latest
    container_name: mongo-arbiter
    hostname: mongo-arbiter
    restart: unless-stopped
    depends_on:
      mongo-secondary:
        condition: service_healthy
    environment:
      MONGODB_ADVERTISED_HOSTNAME: mongo-arbiter
      MONGODB_REPLICA_SET_MODE: arbiter
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_REPLICA_SET_KEY: rs0key
      MONGODB_INITIAL_PRIMARY_HOST: mongo-primary
      MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
      MONGODB_INITIAL_PRIMARY_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./.containers/mongo/arbiter:/bitnami/mongodb
    networks:
      - instaconnect

  redis:
    image: redis:7
    container_name: redis
    hostname: redis
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./.containers/redis/data:/data
    networks:
      - instaconnect

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - ./.containers/rabbitmq/data:/var/lib/rabbitmq
      - ./.containers/rabbitmq/log:/var/log/rabbitmq
    networks:
      - instaconnect

  identity-svc:
    image: ${DOCKER_REGISTRY-}identity-svc
    container_name: identity-svc
    hostname: identity-svc
    build:
      context: .
      dockerfile: src/Services/Identity/InstaConnect.Identity.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_identity"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-primary:27017,mongo-secondary:27017/instaconnect_identity?replicaSet=rs0&w=majority&readPreference=primaryPreferred&connectTimeoutMS=10000&serverSelectionTimeoutMS=10000&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
      CloudinaryConfiguration__CloudName: ${CLOUDINARY_CLOUD_NAME}
      CloudinaryConfiguration__ApiKey: ${CLOUDINARY_API_KEY}
      CloudinaryConfiguration__ApiSecret: ${CLOUDINARY_API_SECRET}
    ports:
      - "8083:80"
    depends_on:
      otel-lgtm:
        condition: service_started
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - instaconnect

  posts-svc:
    image: ${DOCKER_REGISTRY-}posts-svc
    container_name: posts-svc
    hostname: posts-svc
    build:
      context: .
      dockerfile: src/Services/Posts/InstaConnect.Posts.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_posts"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-primary:27017,mongo-secondary:27017/instaconnect_posts?replicaSet=rs0&w=majority&readPreference=primaryPreferred&connectTimeoutMS=10000&serverSelectionTimeoutMS=10000&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    ports:
      - "8082:80"
    depends_on:
      otel-lgtm:
        condition: service_started
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - instaconnect

  chats-svc:
    image: ${DOCKER_REGISTRY-}chats-svc
    container_name: chats-svc
    hostname: chats-svc
    build:
      context: .
      dockerfile: src/Services/Chats/InstaConnect.Chats.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_chats"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-primary:27017,mongo-secondary:27017/instaconnect_chats?replicaSet=rs0&w=majority&readPreference=primaryPreferred&connectTimeoutMS=30000&serverSelectionTimeoutMS=120000&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    ports:
      - "8081:80"
    depends_on:
      otel-lgtm:
        condition: service_started
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - instaconnect

  follows-svc:
    image: ${DOCKER_REGISTRY-}follows-svc
    container_name: follows-svc
    hostname: follows-svc
    build:
      context: .
      dockerfile: src/Services/Follows/InstaConnect.Follows.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_follows"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-primary:27017,mongo-secondary:27017/instaconnect_follows?replicaSet=rs0&w=majority&readPreference=primaryPreferred&connectTimeoutMS=10000&serverSelectionTimeoutMS=10000&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    ports:
      - "8080:80"
    depends_on:
      otel-lgtm:
        condition: service_started
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - instaconnect

  gateway-svc:
    image: nginx:latest
    container_name: gateway-svc
    hostname: gateway-svc
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      identity-svc:
        condition: service_started
      posts-svc:
        condition: service_started
      chats-svc:
        condition: service_started
      follows-svc:
        condition: service_started
    networks:
      - instaconnect
