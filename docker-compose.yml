networks:
  instaconnect:

services:
  observability:
    image: grafana/otel-lgtm
    container_name: observability
    hostname: observability
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./.containers/observability:/data
    healthcheck:
      test: cat /tmp/ready
      interval: 1m
      timeout: 10s
      retries: 10
      start_period: 1m
      start_interval: 10s
    networks:
      - instaconnect

  mongo:
    image: docker.io/bitnami/mongodb:latest
    container_name: mongo
    hostname: mongo
    restart: unless-stopped
    volumes:
      - ./.containers/mongo:/bitnami/mongodb
      - ./mongo/scripts:/docker-entrypoint-initdb.d:ro
    environment:
      MONGODB_ADVERTISED_HOSTNAME: mongo
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_REPLICA_SET_KEY: rs0key
      MONGODB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGODB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGODB_USERNAME: ${MONGO_USERNAME}
      MONGODB_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USERNAME}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - instaconnect

  redis:
    image: redis:7
    container_name: redis
    hostname: redis
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./.containers/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - instaconnect

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - ./.containers/rabbitmq/data:/var/lib/rabbitmq
      - ./.containers/rabbitmq/log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - instaconnect

  identity-svc:
    image: ${DOCKER_REGISTRY-}identity-svc
    container_name: identity-svc
    hostname: identity-svc
    build:
      context: .
      dockerfile: src/Services/Identity/InstaConnect.Identity.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_identity"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/instaconnect_identity?replicaSet=rs0&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
      CloudinaryConfiguration__CloudName: ${CLOUDINARY_CLOUD_NAME}
      CloudinaryConfiguration__ApiKey: ${CLOUDINARY_API_KEY}
      CloudinaryConfiguration__ApiSecret: ${CLOUDINARY_API_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --tries=1 --no-verbose http://127.0.0.1:80/healthz || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      observability:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - instaconnect

  posts-svc:
    image: ${DOCKER_REGISTRY-}posts-svc
    container_name: posts-svc
    hostname: posts-svc
    build:
      context: .
      dockerfile: src/Services/Posts/InstaConnect.Posts.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_posts"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/instaconnect_posts?replicaSet=rs0&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --tries=1 --no-verbose http://127.0.0.1:80/healthz || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      observability:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - instaconnect

  chats-svc:
    image: ${DOCKER_REGISTRY-}chats-svc
    container_name: chats-svc
    hostname: chats-svc
    build:
      context: .
      dockerfile: src/Services/Chats/InstaConnect.Chats.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_chats"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/instaconnect_chats?replicaSet=rs0&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --tries=1 --no-verbose http://127.0.0.1:80/healthz || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      observability:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - instaconnect

  follows-svc:
    image: ${DOCKER_REGISTRY-}follows-svc
    container_name: follows-svc
    hostname: follows-svc
    build:
      context: .
      dockerfile: src/Services/Follows/InstaConnect.Follows.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      AccessTokenConfiguration__SecurityKey: "${ACCESS_TOKEN_SECURITY_KEY}"
      MongoConfiguration__Name: "instaconnect_follows"
      MongoConfiguration__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/instaconnect_follows?replicaSet=rs0&authSource=admin"
      RabbitMqConfiguration__ConnectionString: "amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      RedisConfiguration__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --tries=1 --no-verbose http://127.0.0.1:80/healthz || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      observability:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - instaconnect

  gateway-svc:
    image: nginx:alpine
    container_name: gateway-svc
    hostname: gateway-svc
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      identity-svc:
        condition: service_healthy
      posts-svc:
        condition: service_healthy
      chats-svc:
        condition: service_healthy
      follows-svc:
        condition: service_healthy
    networks:
      - instaconnect
